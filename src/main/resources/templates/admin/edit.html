<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Article</title>

    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="form-page">

    <a href="/admin" class="page-back">
        ← Back to Dashboard
    </a>

    <h1>Edit Article</h1>

    <form th:action="@{'/admin/edit/' + ${article.id}}" method="post">

        <!-- TITLE -->
        <label>Article Title</label>

        <input
                type="text"
                name="title"
                th:value="${article.title}"
                required
        >

        <!-- IMAGE URL -->
        <label>Cover Image URL</label>

        <input
                type="text"
                name="imageUrl"
                th:value="${article.imageUrl}"
                required
        >

        <!-- CONTENT -->
        <label>Article Content</label>

        <textarea
                name="content"
                rows="12"
                required
                th:text="${article.content}">
        </textarea>

        <!-- SUBMIT -->
        <button type="submit">
            Update Article
        </button>

    </form>

</div>

</body>
</html>
